<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PDV - Ponto de Venda</title>

    <!-- Bootstrap: biblioteca de estilos prontos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Nosso arquivo de estilos personalizado -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- CABEÇALHO -->
    <div class="cabecalho">
        <h1>🛒 PDV - Ponto de Venda</h1>
        <p>Sistema de controle de produtos e vendas</p>
    </div>

    <div class="container">

        <!-- ABAS DE NAVEGAÇÃO -->
        <ul class="nav nav-tabs mb-4" id="abas">
            <li class="nav-item">
                <a class="nav-link active" onclick="mostrarAba('produtos')" href="#">Produtos</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="mostrarAba('vendas')" href="#">Vendas</a>
            </li>
        </ul>

        <!-- ============================================
             ABA DE PRODUTOS
        ============================================ -->
        <div id="aba-produtos">

            <!-- Formulário para cadastrar produto -->
            <div class="secao">
                <h4>Cadastrar Produto</h4>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Nome do produto</label>
                        <input type="text" id="nome-produto" class="form-control" placeholder="Ex: Coca-Cola 2L">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Preço (R$)</label>
                        <input type="number" id="preco-produto" class="form-control" placeholder="Ex: 8.50" step="0.01">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Estoque</label>
                        <input type="number" id="estoque-produto" class="form-control" placeholder="Ex: 50">
                    </div>
                </div>

                <button class="btn btn-success" onclick="cadastrarProduto()">Cadastrar</button>

                <div id="msg-produto" class="mensagem"></div>
            </div>

            <!-- Lista de produtos cadastrados -->
            <div class="secao">
                <h4>Produtos Cadastrados</h4>
                <button class="btn btn-secondary btn-sm mb-3" onclick="listarProdutos()">🔄 Atualizar lista</button>
                <div id="lista-produtos">
                    <p class="text-muted">Carregando produtos...</p>
                </div>
            </div>

        </div>

        <!-- ============================================
             ABA DE VENDAS
        ============================================ -->
        <div id="aba-vendas" style="display:none">

            <!-- Formulário para registrar venda -->
            <div class="secao">
                <h4>Registrar Venda</h4>
                <p class="text-muted">Adicione os produtos que foram vendidos:</p>

                <div id="itens-venda">
                </div>

                <button class="btn btn-outline-primary btn-sm mb-3" onclick="adicionarItem()">+ Adicionar item</button>

                <br>
                <button class="btn btn-success" onclick="registrarVenda()">Finalizar Venda</button>

                <div id="msg-venda" class="mensagem"></div>
            </div>

            <!-- Histórico de vendas -->
            <div class="secao">
                <h4>Histórico de Vendas</h4>
                <button class="btn btn-secondary btn-sm mb-3" onclick="listarVendas()">🔄 Atualizar lista</button>
                <div id="lista-vendas">
                    <p class="text-muted">Clique em "Atualizar lista" para carregar as vendas.</p>
                </div>
            </div>

        </div>

    </div>

    <!-- Nosso arquivo JavaScript -->
    <script src="scripts.js"></script>

</body>
</html>
